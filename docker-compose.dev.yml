version: '3.8'

services:
  database:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smartlb
      POSTGRES_USER: smartlb_root
      POSTGRES_PASSWORD: password

  api-gateway:
    ports:
      - "${API_GATEWAY_PORT:-8080}:${API_GATEWAY_PORT:-8080}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION}
      - JWT_REFRESH_TOKEN_EXPIRATION=${JWT_REFRESH_TOKEN_EXPIRATION}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-8080}

  auth-service:
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:${AUTH_SERVICE_PORT:-8081}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION}
      - JWT_REFRESH_TOKEN_EXPIRATION=${JWT_REFRESH_TOKEN_EXPIRATION}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT:-8081}

  customer-service:
    ports:
      - "${TENANT_SERVICE_PORT:-8082}:${TENANT_SERVICE_PORT:-8082}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - TENANT_SERVICE_PORT=${TENANT_SERVICE_PORT:-8082}

  admin-service:
    ports:
      - "${ADMIN_SERVICE_PORT:-8083}:${ADMIN_SERVICE_PORT:-8083}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_SERVICE_PORT=${ADMIN_SERVICE_PORT:-8083}

  loadbalancer-service:
    ports:
      - "${LOADBALANCER_SERVICE_PORT:-8084}:${LOADBALANCER_SERVICE_PORT:-8084}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - AI_SERVICE_URL=${AI_SERVICE_URL}
      - LOADBALANCER_SERVICE_PORT=${LOADBALANCER_SERVICE_PORT:-8084}

  monitoring-service:
    ports:
      - "${MONITORING_SERVICE_PORT:-8085}:${MONITORING_SERVICE_PORT:-8085}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - MONITORING_SERVICE_PORT=${MONITORING_SERVICE_PORT:-8085}

  autoscaling-service:
    ports:
      - "${AUTOSCALING_SERVICE_PORT:-8086}:${AUTOSCALING_SERVICE_PORT:-8086}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - AUTOSCALING_SERVICE_PORT=${AUTOSCALING_SERVICE_PORT:-8086}

  ai-service:
    ports:
      - "${AI_SERVICE_PORT:-8000}:${AI_SERVICE_PORT:-8000}"
    environment:
      - ENV=${SPRING_PROFILES_ACTIVE:-dev}
      - AI_SERVICE_PORT=${AI_SERVICE_PORT:-8000}
      - DATABASE_URL=${DATABASE_URL}

  frontend:
    ports:
      - "3000:3000"

  nginx:
    ports:
      - "${NGINX_PORT:-80}:${NGINX_PORT:-80}"
      - "443:443"
    environment:
      - NGINX_PORT=${NGINX_PORT:-80}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-8080}

  backend-server-1:
    ports:
      - "${BACKEND_1_PORT:-5001}:5001"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BACKEND_PORT=5001
      - SERVER_INSTANCE=1

  backend-server-2:
    ports:
      - "${BACKEND_2_PORT:-5002}:5002"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BACKEND_PORT=5002
      - SERVER_INSTANCE=2

  backend-server-3:
    ports:
      - "${BACKEND_3_PORT:-5003}:5003"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BACKEND_PORT=5003
      - SERVER_INSTANCE=3

  backend-server-4:
    ports:
      - "${BACKEND_4_PORT:-5004}:5004"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BACKEND_PORT=5004
      - SERVER_INSTANCE=4

  backend-server-5:
    ports:
      - "${BACKEND_5_PORT:-5005}:5005"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BACKEND_PORT=5005
      - SERVER_INSTANCE=5